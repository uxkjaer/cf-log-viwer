name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: bump
        run: |
          # Get latest tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Parse version components
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Bump patch
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"

          # Check if HEAD already has this tag (avoid duplicate releases)
          HEAD_TAGS=$(git tag --points-at HEAD 2>/dev/null || true)
          if echo "$HEAD_TAGS" | grep -q "^v"; then
            echo "HEAD already tagged: $HEAD_TAGS"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=$HEAD_TAGS" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          # Create and push the tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

  build:
    needs: tag
    if: needs.tag.outputs.skipped != 'true'
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: cf-log-viewer-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: cf-log-viewer-linux-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: cf-log-viewer-darwin-x64
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: cf-log-viewer-darwin-arm64
          - target: bun-windows-x64
            os: ubuntu-latest
            artifact: cf-log-viewer-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binary
        run: |
          mkdir -p dist
          bun build bin/cf-log-viewer.js --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f -not -name '*.sha256' | while read f; do
            sha256sum "$f" >> checksums.sha256
          done
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: cf-log-viewer ${{ needs.tag.outputs.new_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/cf-log-viewer-linux-x64/cf-log-viewer-linux-x64
            artifacts/cf-log-viewer-linux-arm64/cf-log-viewer-linux-arm64
            artifacts/cf-log-viewer-darwin-x64/cf-log-viewer-darwin-x64
            artifacts/cf-log-viewer-darwin-arm64/cf-log-viewer-darwin-arm64
            artifacts/cf-log-viewer-windows-x64.exe/cf-log-viewer-windows-x64.exe
            artifacts/checksums.sha256
